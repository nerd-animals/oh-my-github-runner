name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tests/**'
      - '.gitignore'
      - '.env.example'
      - 'ops/systemd/**'
      - 'ops/cloudflared/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags:            tag:gh-deploy

      - name: Run deploy script on VM
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              ubuntu@github-runner \
              'bash /opt/oh-my-github-runner/current/ops/scripts/deploy.sh'
