id: pr-review-comment
revision: 3
source_kind: pull_request
mode: observe
workflow: observe
context:
  include_pr_body: true
  include_pr_comments: true
  include_pr_diff: true
permissions:
  code_read: true
  code_write: false
  git_push: false
  pr_create: false
  pr_update: false
  comment_write: true
github_actions:
  - pull_request_comment
execution:
  timeout_sec: 1800
