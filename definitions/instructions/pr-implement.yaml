id: pr-implement
revision: 2
source_kind: pull_request
mode: mutate
workflow: pr_implement
context:
  include_pr_body: true
  include_pr_comments: true
  include_pr_diff: true
permissions:
  code_read: true
  code_write: true
  git_push: true
  pr_create: false
  pr_update: false
  comment_write: true
github_actions:
  - branch_push
  - pull_request_comment
execution:
  timeout_sec: 3600
