# Rate-limit signature for the claude agent.
#
# The Claude Code CLI returns exit code 0 even when it has hit a usage cap;
# the failure shows up either in plain stdout (when invoked with -p alone)
# or as the "result" field of the JSON envelope (when invoked with
# --output-format json). Both phrasings observed in production:
#   - "You've hit your org's monthly usage limit"
#   - "You've hit your limit · resets 11:30am (UTC)"
# Plus the JSON-mode escape hatch matching api_error_status=429.
exit_codes: []
stderr_patterns:
  - "You've hit your.*limit"
  - '"api_error_status":\s*429'
